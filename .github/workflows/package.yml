name: Package Application

on:
  workflow_dispatch:
  push:
    branches: [ main]
    tags:
      - 'v*'

  pull_request:
    types: [closed, synchronize, opened, reopened]
    branches: [ "main" ]

permissions:
  contents: write
  packages: write

jobs:
  package-windows:
    name: Package for Windows
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: '**/requirements*.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Syncer/requirements.txt
        pip install -r Syncer/requirements-gui.txt
        pip install pyinstaller

    - name: Build Windows executable
      run: |
        python build.py

    - name: Rename Windows executable
      run: |
        mv dist/HelloAssoSyncer dist/HelloAssoSyncer-windows-x64

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v7
      with:
        name: HelloAssoSyncer-windows-x64
        path: dist/HelloAssoSyncer-windows-x64
        compression-level: 9
        retention-days: 7


  package-macos:
    name: Package for macOS
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: '**/requirements*.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Syncer/requirements.txt
        pip install -r Syncer/requirements-gui.txt
        pip install pyinstaller

    - name: Build macOS application
      run: |
        python -m PyInstaller \
          --name=HelloAssoSyncer \
          --windowed \
          --clean \
          --distpath=dist \
          --workpath=build \
          --onedir \
          --icon=Syncer/assets/app_icon.icns \
          --add-data="Syncer/gui/styles/styles.css:Syncer/gui/styles" \
          --add-data="Syncer/secrets.template.json:Syncer" \
          --add-data="Syncer/Readme.md:Syncer" \
          launcher.py

    - name: Install create-dmg (optional)
      continue-on-error: true
      run: brew install create-dmg

    - name: Create DMG
      continue-on-error: true
      run: |
        mkdir -p dmg_temp
        cp -r dist/HelloAssoSyncer.app dmg_temp/
        cp Readme.md dmg_temp/
        create-dmg \
          --volname "HelloAssoSyncer" \
          --volicon "Syncer/assets/app_icon.icns" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "HelloAssoSyncer.app" 200 190 \
          --app-drop-link 400 190 \
          dist/HelloAssoSyncer-macos-x64.dmg \
          dmg_temp

    - name: List artifacts
      run: |
        ls -la dist/
        test -d dist/HelloAssoSyncer.app || { echo "❌ Error: .app not found"; exit 1; }
        test -f dist/HelloAssoSyncer-macos-x64.dmg || { echo "❌ Error: .dmg not found"; exit 1; }

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v7
      with:
        name: HelloAssoSyncer-macos-x64
        path: |
           dist/HelloAssoSyncer-macos-x64.dmg
        compression-level: 9
        retention-days: 7


  package-linux:
    name: Package for Linux
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: '**/requirements*.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Syncer/requirements.txt
        pip install -r Syncer/requirements-gui.txt
        pip install pyinstaller

    - name: Build Linux executable
      run: |
        python -m PyInstaller \
          --name=HelloAssoSyncer \
          --windowed \
          --clean \
          --distpath=dist \
          --workpath=build \
          --onedir \
          --icon=Syncer/assets/app_icon.png \
          --add-data="Syncer/gui/styles/styles.css:Syncer/gui/styles" \
          --add-data="Syncer/secrets.template.json:Syncer" \
          --add-data="Syncer/Readme.md:Syncer" \
          launcher.py

    - name: Rename Linux executable
      run: |
        mv dist/HelloAssoSyncer dist/HelloAssoSyncer-linux-x64

    - name: Create Linux AppImage (optional)
      continue-on-error: true
      run: |
        # Install linuxdeployqt if available
        if command -v linuxdeployqt &> /dev/null; then
          linuxdeployqt dist/HelloAssoSyncer-linux-x64 -appimage -executable=HelloAssoSyncer-linux-x64 -no-translations
        fi

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v7
      with:
        name: HelloAssoSyncer-linux-x64
        path: dist/*
        compression-level: 9
        retention-days: 7



  create-release:
    name: Create Release
    needs: [package-windows, package-macos, package-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/minimal_ui'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts
        merge-multiple: false

    - name: List artifacts
      run: find artifacts -type f

    - name: Create release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          artifacts/HelloAssoSyncer-windows-x64/*.exe
          artifacts/HelloAssoSyncer-macos-x64/*.dmg
          artifacts/HelloAssoSyncer-linux-x64/*
        name: HelloAsso Syncer v1.0.0
        tag_name: v1.0.0
        body: |
          ### HelloAsso Syncer v1.0.0

          Self-contained executables for Windows, macOS, and Linux.

          **Download the appropriate version for your platform:**

          - **Windows**: `HelloAssoSyncer-windows-x64.exe`
          - **macOS**: `HelloAssoSyncer-macos-x64.dmg`
          - **Linux**: `HelloAssoSyncer-linux-x64`

          **Note**: These are standalone executables that do not require Python to be installed.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
